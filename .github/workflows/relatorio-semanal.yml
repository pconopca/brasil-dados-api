# Relatório semanal: todo domingo às 10:00 UTC (07:00 São Paulo) gera
# um resumo em Markdown e abre uma issue no repo (que dispara e-mail
# para o Pedro).
name: relatorio-semanal

on:
  schedule:
    - cron: "0 10 * * 0"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  relatorio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: gera relatório
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: python3 scripts/monitor.py semanal > relatorio.md
      - name: abre issue com o relatório
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          titulo=$(head -1 relatorio.md | sed 's/^# *//')
          gh issue create --title "$titulo" --body-file relatorio.md --label "relatorio-semanal"
